<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Programme Muscu</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --green: #3fb950;
  --green-dim: #238636;
  --blue: #58a6ff;
  --orange: #d29922;
  --red: #f85149;
  --purple: #bc8cff;
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: var(--green); }
.header-right { display: flex; align-items: center; gap: 12px; }
.btn-icon {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all .15s;
}
.btn-icon:hover { background: var(--bg3); color: var(--text); border-color: var(--text2); }

/* MAXES DISPLAY */
.maxes-bar {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  font-size: 13px;
}
.max-item { display: flex; align-items: center; gap: 6px; }
.max-label { color: var(--text2); }
.max-value { color: var(--blue); font-weight: 700; }

/* NAV */
.nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 0;
  overflow-x: auto;
}
.nav-section {
  display: flex;
  align-items: stretch;
}
.nav-section:first-child { border-right: 1px solid var(--border); margin-right: 8px; padding-right: 8px; }
.nav-tab {
  padding: 12px 16px;
  cursor: pointer;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  user-select: none;
}
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
.nav-tab.rest { color: var(--text2); opacity: .5; font-style: italic; }
.nav-tab.locked { opacity: 0.3; cursor: not-allowed; pointer-events: none; color: var(--text2); }

/* CONTENT */
.content {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px;
}
.day-header {
  margin-bottom: 24px;
}
.day-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.day-header p { color: var(--text2); font-size: 14px; }
.day-progress {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
  transition: width .3s ease;
}
.progress-text { font-size: 13px; color: var(--text2); min-width: 40px; }

/* REST DAY */
.rest-day {
  text-align: center;
  padding: 80px 24px;
}
.rest-day .icon { font-size: 64px; margin-bottom: 16px; }
.rest-day h2 { font-size: 28px; margin-bottom: 8px; }
.rest-day p { color: var(--text2); font-size: 16px; }

/* EXERCISE CARD */
.exercise-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color .15s;
}
.exercise-card.completed { border-color: var(--green-dim); }
.exercise-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.exercise-tag {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--green);
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.exercise-name { font-weight: 600; font-size: 16px; flex: 1; }
.exercise-check {
  color: var(--text2);
  font-size: 18px;
}
.exercise-card.completed .exercise-check { color: var(--green); }

/* SET ROWS */
.sets-container { padding: 0 16px 12px; }
.set-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  gap: 12px;
  border-top: 1px solid var(--border);
  transition: opacity .15s;
}
.set-row.done { opacity: .5; }
.set-checkbox {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  color: transparent;
  font-size: 14px;
}
.set-checkbox:hover { border-color: var(--green); }
.set-checkbox.checked {
  background: var(--green);
  border-color: var(--green);
  color: #000;
}
.set-info { flex: 1; font-size: 14px; }
.set-info .reps { font-weight: 600; }
.set-info .weight { color: var(--blue); margin-left: 6px; font-weight: 600; }
.set-info .pct { color: var(--text2); margin-left: 4px; font-size: 12px; }
.set-info .rpe { color: var(--orange); margin-left: 8px; font-size: 12px; font-weight: 600; }
.set-info .amrap-badge {
  background: var(--red);
  color: #fff;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  margin-left: 6px;
}

/* TIMER */
.timer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 100;
}
.timer-display {
  font-size: 32px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 100px;
  text-align: center;
}
.timer-display.warning { color: var(--orange); }
.timer-display.done { color: var(--green); }
.timer-btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.timer-btn:hover { background: var(--border); }
.timer-btn.primary { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.timer-btn.primary:hover { background: var(--green); color: #000; }
.timer-presets { display: flex; gap: 6px; }
.timer-preset {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.timer-preset:hover, .timer-preset.active { border-color: var(--green); color: var(--green); }

/* SETTINGS MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 400px;
  max-width: 90vw;
}
.modal h3 { margin-bottom: 16px; font-size: 18px; }
.modal label { display: block; color: var(--text2); font-size: 13px; margin-bottom: 6px; margin-top: 14px; }
.modal input[type="date"], .modal input[type="number"] {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; flex-wrap: wrap; }
.modal-actions button {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
}
.modal-actions .save { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.modal-actions .danger { background: #5c1a1a; border-color: var(--red); color: var(--red); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* Extra bottom padding for timer */
.content { padding-bottom: 180px; }

/* PAGE TOGGLE */
.page-toggle {
  display: flex;
  gap: 0;
  background: var(--bg3);
  border-radius: 8px;
  padding: 2px;
  margin-left: 12px;
}
.page-toggle button {
  padding: 6px 14px;
  border: none;
  background: none;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
}
.page-toggle button.active { background: var(--green-dim); color: var(--green); }
.page-toggle button:hover:not(.active) { color: var(--text); }

/* HISTORY PAGE */
.history-container { max-width: 900px; margin: 0 auto; padding: 24px; padding-bottom: 180px; }
.history-container h2 { font-size: 22px; margin-bottom: 20px; }

.history-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.history-filters select, .history-filters input {
  padding: 6px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
}

.maxes-history {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 24px;
}
.maxes-history h3 { font-size: 15px; margin-bottom: 12px; color: var(--text2); }
.maxes-chart {
  display: flex;
  gap: 24px;
}
.max-chart-item { flex: 1; }
.max-chart-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.max-chart-value { font-size: 22px; font-weight: 700; color: var(--blue); }
.max-chart-delta { font-size: 12px; margin-left: 6px; }
.max-chart-delta.up { color: var(--green); }
.max-chart-delta.down { color: var(--red); }
.max-chart-delta.same { color: var(--text2); }

.max-timeline {
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.max-timeline-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.max-timeline-row:last-child { border-bottom: none; }
.max-timeline-date { color: var(--text2); min-width: 90px; }
.max-timeline-values { display: flex; gap: 16px; }
.max-timeline-val { font-weight: 600; }
.max-timeline-val.squat { color: var(--green); }
.max-timeline-val.bench { color: var(--blue); }
.max-timeline-val.dl { color: var(--orange); }

.session-log {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.session-header {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.session-header:hover { background: var(--bg3); }
.session-date { font-weight: 600; min-width: 100px; }
.session-label { flex: 1; color: var(--text2); font-size: 14px; }
.session-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
}
.session-badge.complete { background: var(--green-dim); color: var(--green); }
.session-badge.partial { background: #3d2e00; color: var(--orange); }
.session-detail {
  padding: 0 16px 12px;
  display: none;
  border-top: 1px solid var(--border);
}
.session-detail.open { display: block; padding-top: 12px; }
.session-exercise { margin-bottom: 8px; }
.session-exercise-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.session-sets { font-size: 12px; color: var(--text2); }

.empty-history {
  text-align: center;
  padding: 60px 24px;
  color: var(--text2);
}
.empty-history .icon { font-size: 48px; margin-bottom: 12px; }

/* Graph bars */
.graph-container {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 24px;
}
.graph-container h3 { font-size: 15px; margin-bottom: 16px; color: var(--text2); }
.graph-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 120px;
  padding-top: 8px;
}
.graph-bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}
.graph-bar {
  width: 100%;
  max-width: 30px;
  border-radius: 3px 3px 0 0;
  min-height: 2px;
  transition: height .3s;
}
.graph-bar.squat { background: var(--green); }
.graph-bar.bench { background: var(--blue); }
.graph-bar.dl { background: var(--orange); }
.graph-bar-label {
  font-size: 10px;
  color: var(--text2);
  margin-top: 4px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 50px;
}
.graph-legend {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  justify-content: center;
}
.graph-legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text2);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .content { padding: 16px; padding-bottom: 180px; }
  .nav-tab { padding: 10px 12px; font-size: 13px; }
  .timer-bar { padding: 10px 16px; flex-wrap: wrap; }
  .maxes-bar { gap: 12px; font-size: 12px; flex-wrap: wrap; }
}

/* LOGIN SCREEN */
.login-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  width: 320px;
  max-width: 90vw;
}
.login-box h2 {
  font-size: 22px;
  margin-bottom: 8px;
}
.login-box h2 span { color: var(--green); }
.login-box p {
  color: var(--text2);
  font-size: 14px;
  margin-bottom: 24px;
}
.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 16px;
  outline: none;
  margin-bottom: 16px;
}
.login-box input:focus {
  border-color: var(--green);
}
.login-box button {
  width: 100%;
  padding: 12px;
  background: var(--green-dim);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.login-box button:hover {
  background: var(--green);
}
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2><span>&#9679;</span> Programme Muscu</h2>
    <p>Mot de passe requis</p>
    <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="off">
    <button onclick="attemptLogin()">Entrer</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<div class="header">
  <h1><span>&#9679;</span> Programme Muscu — <span id="cycleDisplay" style="color:var(--green)">Cycle 1</span></h1>
  <div class="header-right">
    <div class="page-toggle">
      <button class="active" id="btnProgram" onclick="showPage('program')">Programme</button>
      <button id="btnHistory" onclick="showPage('history')">Historique</button>
    </div>
    <button class="btn-icon" onclick="openSettings()" title="Paramètres">&#9881;</button>
    <button class="btn-icon" onclick="resetDay()" title="Reset jour">&#8635;</button>
  </div>
</div>

<div class="maxes-bar" id="maxesBar">
  <div class="max-item"><span class="max-label">Squat</span><span class="max-value" id="dispSquat">110 kg</span></div>
  <div class="max-item"><span class="max-label">Bench</span><span class="max-value" id="dispBench">97 kg</span></div>
  <div class="max-item"><span class="max-label">Deadlift</span><span class="max-value" id="dispDeadlift">120 kg</span></div>
</div>

<div class="nav" id="nav"></div>

<div class="content" id="content"></div>

<div class="history-container" id="historyPage" style="display:none"></div>

<div class="timer-bar">
  <div class="timer-presets">
    <button class="timer-preset" onclick="setTimer(60)">1:00</button>
    <button class="timer-preset active" onclick="setTimer(120)">2:00</button>
    <button class="timer-preset" onclick="setTimer(180)">3:00</button>
    <button class="timer-preset" onclick="setTimer(300)">5:00</button>
  </div>
  <div class="timer-display" id="timerDisplay">2:00</div>
  <button class="timer-btn primary" id="timerBtn" onclick="toggleTimer()">Start</button>
  <button class="timer-btn" onclick="resetTimer()">Reset</button>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>Paramètres</h3>
    <label>Maxes actuels (kg)</label>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <div style="flex:1"><input type="number" id="maxSquat" placeholder="Squat" step="0.5"><small style="color:var(--text2)">Squat</small></div>
      <div style="flex:1"><input type="number" id="maxBench" placeholder="Bench" step="0.5"><small style="color:var(--text2)">Bench</small></div>
      <div style="flex:1"><input type="number" id="maxDeadlift" placeholder="DL" step="0.5"><small style="color:var(--text2)">Deadlift</small></div>
    </div>
    <div class="modal-actions">
      <div style="display:flex;gap:8px">
        <button class="danger" onclick="resetAllProgress()">Reset prog.</button>
        <button class="danger" onclick="resetHistory()">Reset histo.</button>
        <button class="danger" onclick="logout()">Déconnexion</button>
      </div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button onclick="closeSettings()">Annuler</button>
        <button class="save" onclick="saveSettings()">Sauver</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// PASSWORD PROTECTION
// ============================================================
const PASSWORD_HASH = '46946c6f5a5426b464311253c31e21893a36e492a1e7196c1baf3c84c38690d8';

async function hashPassword(pwd) {
  const data = new TextEncoder().encode(pwd);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function attemptLogin() {
  const input = document.getElementById('loginPassword').value;
  const hash = await hashPassword(input);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem('muscu_auth', '1');
    document.getElementById('loginOverlay').style.display = 'none';
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPassword').value = '';
  }
}

document.getElementById('loginPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') attemptLogin();
});

// Check auth
if (localStorage.getItem('muscu_auth') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
}

// ============================================================
// FIREBASE SYNC
// ============================================================
const FIREBASE_DB = 'https://skin-grinding-default-rtdb.firebaseio.com';
const FB_USER_PATH = PASSWORD_HASH.substring(0, 16); // short hash as path

function fbPut(path, data) {
  fetch(`${FIREBASE_DB}/users/${FB_USER_PATH}/${path}.json`, {
    method: 'PUT',
    body: JSON.stringify(data)
  }).catch(() => {});
}

async function fbGet(path) {
  try {
    const res = await fetch(`${FIREBASE_DB}/users/${FB_USER_PATH}/${path}.json`);
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

// ============================================================
// PROGRAM DATA — 4-week cycle
// Each exercise has optional `ref` ("squat"|"bench"|"deadlift")

// ============================================================
// STATE
// ============================================================
let state = {
  cycle: 1,
  week: 0,
  day: 0,
  completions: {},
  maxSquat: 110,
  maxBench: 97,
  maxDeadlift: 120,
  timerDuration: 120,
  timerRemaining: 120,
  timerRunning: false,
  timerInterval: null
};

// ============================================================
// WEIGHT CALCULATION
// ============================================================
function getMax(ref) {
  if (ref === "squat") return state.maxSquat;
  if (ref === "bench") return state.maxBench;
  if (ref === "deadlift") return state.maxDeadlift;
  return null;
}

function calcWeight(pct, ref) {
  const max = getMax(ref);
  if (!max || !pct) return null;
  return Math.round((max * pct / 100) / 2.5) * 2.5;
}

// ============================================================
// HELPERS
// ============================================================
function expandSets(exercise) {
  const expanded = [];
  exercise.sets.forEach((group, gi) => {
    for (let i = 0; i < group.s; i++) {
      expanded.push({ ...group, groupIndex: gi, setIndex: i, ref: exercise.ref });
    }
  });
  return expanded;
}

function setKey(week, day, exIdx, setIdx) {
  return `w${week}d${day}e${exIdx}s${setIdx}`;
}

function isSetDone(week, day, exIdx, setIdx) {
  return !!state.completions[setKey(week, day, exIdx, setIdx)];
}

function toggleSetDone(week, day, exIdx, setIdx) {
  const key = setKey(week, day, exIdx, setIdx);
  const wasChecked = !!state.completions[key];
  if (wasChecked) {
    delete state.completions[key];
  } else {
    state.completions[key] = true;
    // Auto-start 4min timer when checking a set
    setTimer(240);
    if (state.timerRunning) {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
    }
    toggleTimer();
  }
  saveState();
  render();
  logSession(week, day);
}

function getDayProgress(week, day) {
  const dayData = PROGRAM[week].days[day];
  if (dayData.rest) return { done: 0, total: 0, pct: 100 };
  let total = 0, done = 0;
  dayData.exercises.forEach((ex, ei) => {
    const sets = expandSets(ex);
    total += sets.length;
    sets.forEach((_, si) => {
      if (isSetDone(week, day, ei, si)) done++;
    });
  });
  return { done, total, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function isBlocComplete(blocIndex) {
  const bloc = PROGRAM[blocIndex];
  for (let di = 0; di < bloc.days.length; di++) {
    if (bloc.days[di].rest) continue;
    if (getDayProgress(blocIndex, di).pct < 100) return false;
  }
  return true;
}

function isBlocUnlocked(blocIndex) {
  if (blocIndex === 0) return true;
  return isBlocComplete(blocIndex - 1);
}

// ============================================================
// RENDER
// ============================================================
function renderMaxesBar() {
  document.getElementById('dispSquat').textContent = state.maxSquat + ' kg';
  document.getElementById('dispBench').textContent = state.maxBench + ' kg';
  document.getElementById('dispDeadlift').textContent = state.maxDeadlift + ' kg';
}

function renderNav() {
  const nav = document.getElementById('nav');
  let html = '<div class="nav-section">';
  PROGRAM.forEach((w, wi) => {
    const active = wi === state.week ? 'active' : '';
    const locked = !isBlocUnlocked(wi) ? 'locked' : '';
    const check = isBlocComplete(wi) ? ' &#10003;' : '';
    html += `<div class="nav-tab ${active} ${locked}" onclick="selectWeek(${wi})">${w.name}${check}</div>`;
  });
  html += '</div><div class="nav-section">';
  PROGRAM[state.week].days.forEach((d, di) => {
    const active = di === state.day ? 'active' : '';
    const rest = d.rest ? 'rest' : '';
    const prog = getDayProgress(state.week, di);
    const label = d.rest ? 'Repos' : `T${di+1}`;
    const check = (!d.rest && prog.pct === 100) ? ' &#10003;' : '';
    html += `<div class="nav-tab ${active} ${rest}" onclick="selectDay(${di})">${label}${check}</div>`;
  });
  html += '</div>';
  nav.innerHTML = html;
}

function renderContent() {
  const content = document.getElementById('content');
  const dayData = PROGRAM[state.week].days[state.day];

  if (dayData.rest) {
    content.innerHTML = `
      <div class="rest-day">
        <div class="icon">&#128564;</div>
        <h2>Repos</h2>
        <p>Récupère bien. Mange. Dors. Reviens plus fort.</p>
      </div>`;
    return;
  }

  const prog = getDayProgress(state.week, state.day);
  let html = `
    <div class="day-header">
      <h2>${dayData.name}</h2>
      <p>${PROGRAM[state.week].name} — T${state.day + 1}</p>
      <div class="day-progress">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
        <span class="progress-text">${prog.done}/${prog.total}</span>
      </div>
    </div>`;

  dayData.exercises.forEach((ex, ei) => {
    const sets = expandSets(ex);
    const allDone = sets.every((_, si) => isSetDone(state.week, state.day, ei, si));
    const cardClass = allDone ? 'exercise-card completed' : 'exercise-card';

    html += `<div class="${cardClass}">`;
    html += `<div class="exercise-header">`;
    html += `<div class="exercise-tag">${ex.tag}</div>`;
    html += `<div class="exercise-name">${ex.name}</div>`;
    html += `<div class="exercise-check">${allDone ? '&#10003;' : ''}</div>`;
    html += `</div>`;
    html += `<div class="sets-container">`;

    sets.forEach((set, si) => {
      const done = isSetDone(state.week, state.day, ei, si);
      const rowClass = done ? 'set-row done' : 'set-row';
      const checkClass = done ? 'set-checkbox checked' : 'set-checkbox';

      // Build set info
      let info = '<span class="reps">';
      if (set.r === "AMRAP") {
        info += `1 rep</span><span class="amrap-badge">AMRAP</span>`;
      } else {
        info += `${set.r} rep${set.r > 1 ? 's' : ''}</span>`;
      }

      // Calculate weight from percentage if available
      if (set.pct !== undefined && set.ref) {
        const kg = calcWeight(set.pct, set.ref);
        if (kg !== null) {
          const actualPct = Math.round(kg / getMax(set.ref) * 100);
          info += `<span class="weight">${kg} kg</span>`;
          info += `<span class="pct">(${actualPct}%)</span>`;
        }
      }

      if (set.rpe !== undefined) {
        info += `<span class="rpe">RPE ${set.rpe}</span>`;
      }

      html += `<div class="${rowClass}">`;
      html += `<div class="${checkClass}" onclick="toggleSetDone(${state.week},${state.day},${ei},${si})">&#10003;</div>`;
      html += `<div class="set-info">${info}</div>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  // Cycle advancement banner
  if (isBlocComplete(3)) {
    html += `
      <div style="text-align:center;margin-top:32px;padding:24px;background:var(--bg2);border:1px solid var(--green-dim);border-radius:var(--radius);">
        <h3 style="color:var(--green);margin-bottom:8px;">Cycle ${state.cycle} terminé !</h3>
        <p style="color:var(--text2);margin-bottom:16px;">Tous les blocs sont complétés.</p>
        <button onclick="advanceCycle()" style="padding:10px 24px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;">
          Commencer Cycle ${state.cycle + 1}
        </button>
      </div>`;
  }

  content.innerHTML = html;
}

function render() {
  document.getElementById('cycleDisplay').textContent = `Cycle ${state.cycle}`;
  renderMaxesBar();
  renderNav();
  renderContent();
}

// ============================================================
// NAVIGATION
// ============================================================
function selectWeek(w) {
  if (!isBlocUnlocked(w)) return;
  state.week = w;
  state.day = 0;
  saveState();
  render();
}

function selectDay(d) {
  state.day = d;
  saveState();
  render();
}

function advanceCycle() {
  if (!isBlocComplete(3)) return;
  state.cycle++;
  state.completions = {};
  state.week = 0;
  state.day = 0;
  saveState();
  render();
}

function resetDay() {
  const dayData = PROGRAM[state.week].days[state.day];
  if (dayData.rest) return;
  dayData.exercises.forEach((ex, ei) => {
    const sets = expandSets(ex);
    sets.forEach((_, si) => {
      delete state.completions[setKey(state.week, state.day, ei, si)];
    });
  });
  saveState();
  render();
}

// ============================================================
// TIMER
// ============================================================
function setTimer(seconds) {
  state.timerDuration = seconds;
  state.timerRemaining = seconds;
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
  }
  updateTimerDisplay();
  document.querySelectorAll('.timer-preset').forEach(btn => {
    const parts = btn.textContent.split(':');
    const btnSecs = parseInt(parts[0])*60 + parseInt(parts[1]);
    btn.classList.toggle('active', btnSecs === seconds);
  });
}

function toggleTimer() {
  if (state.timerRunning) {
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    document.getElementById('timerBtn').textContent = 'Start';
  } else {
    if (state.timerRemaining <= 0) {
      state.timerRemaining = state.timerDuration;
    }
    state.timerRunning = true;
    document.getElementById('timerBtn').textContent = 'Pause';
    state.timerInterval = setInterval(() => {
      state.timerRemaining--;
      if (state.timerRemaining <= 0) {
        state.timerRemaining = 0;
        clearInterval(state.timerInterval);
        state.timerRunning = false;
        document.getElementById('timerBtn').textContent = 'Start';
        playAlarm();
      }
      updateTimerDisplay();
    }, 1000);
  }
  updateTimerDisplay();
}

function resetTimer() {
  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerRemaining = state.timerDuration;
  document.getElementById('timerBtn').textContent = 'Start';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  const mins = Math.floor(state.timerRemaining / 60);
  const secs = state.timerRemaining % 60;
  el.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  el.className = 'timer-display';
  if (state.timerRemaining <= 10 && state.timerRemaining > 0 && state.timerRunning) {
    el.classList.add('warning');
  } else if (state.timerRemaining === 0) {
    el.classList.add('done');
  }
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 200, 400].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.value = 0.3;
      osc.start(ctx.currentTime + delay/1000);
      osc.stop(ctx.currentTime + delay/1000 + 0.15);
    });
  } catch(e) {}
}

// ============================================================
// PERSISTENCE
// ============================================================
function saveState() {
  const data = {
    cycle: state.cycle,
    week: state.week,
    day: state.day,
    completions: state.completions,
    maxSquat: state.maxSquat,
    maxBench: state.maxBench,
    maxDeadlift: state.maxDeadlift,
    timerDuration: state.timerDuration
  };
  localStorage.setItem('muscu_program', JSON.stringify(data));
  fbPut('state', data);
}

function loadState() {
  try {
    const data = JSON.parse(localStorage.getItem('muscu_program'));
    if (data) {
      state.cycle = data.cycle || 1;
      state.week = data.week || 0;
      state.day = data.day || 0;
      state.completions = data.completions || {};
      state.maxSquat = data.maxSquat || 110;
      state.maxBench = data.maxBench || 97;
      state.maxDeadlift = data.maxDeadlift || 120;
      state.timerDuration = data.timerDuration || 120;
      state.timerRemaining = state.timerDuration;
    }
  } catch(e) {}
  if (!isBlocUnlocked(state.week)) {
    state.week = 0;
    state.day = 0;
  }
}

// ============================================================
// HISTORY SYSTEM
// ============================================================
// History stores: { sessions: [...], maxHistory: [...] }
// session: { date, cycle, week, day, dayName, maxes: {s,b,d}, setsTotal, setsDone }
// maxHistory: { date, squat, bench, deadlift }

function loadHistory() {
  try {
    const data = JSON.parse(localStorage.getItem('muscu_history'));
    return data || { sessions: [], maxHistory: [] };
  } catch(e) { return { sessions: [], maxHistory: [] }; }
}

function saveHistory(history) {
  localStorage.setItem('muscu_history', JSON.stringify(history));
  fbPut('history', history);
}

function logSession(week, day) {
  const dayData = PROGRAM[week].days[day];
  if (dayData.rest) return;

  const prog = getDayProgress(week, day);
  if (prog.done === 0) return; // Don't log empty sessions

  const history = loadHistory();
  const today = new Date().toISOString().split('T')[0];
  // Build exercise details
  const exercises = [];
  dayData.exercises.forEach((ex, ei) => {
    const sets = expandSets(ex);
    const details = [];
    let exDone = 0;
    sets.forEach((set, si) => {
      const done = isSetDone(week, day, ei, si);
      if (done) exDone++;
      let desc = `${set.r === "AMRAP" ? "AMRAP" : set.r + "r"}`;
      if (set.pct && ex.ref) {
        desc += ` ${calcWeight(set.pct, ex.ref)}kg`;
      }
      if (set.rpe) desc += ` RPE${set.rpe}`;
      details.push({ desc, done });
    });
    exercises.push({ name: ex.name, sets: details, done: exDone, total: sets.length });
  });

  // Check if session for today+week+day already exists, update it
  const existingIdx = history.sessions.findIndex(s =>
    s.date === today && s.week === week && s.day === day && s.cycle === state.cycle
  );

  const session = {
    date: today,
    cycle: state.cycle,
    week,
    day,
    dayName: dayData.name,
    weekName: PROGRAM[week].name,
    maxes: { squat: state.maxSquat, bench: state.maxBench, deadlift: state.maxDeadlift },
    setsTotal: prog.total,
    setsDone: prog.done,
    exercises
  };

  if (existingIdx >= 0) {
    history.sessions[existingIdx] = session;
  } else {
    history.sessions.push(session);
  }

  // Keep last 500 sessions max
  if (history.sessions.length > 500) {
    history.sessions = history.sessions.slice(-500);
  }

  saveHistory(history);
}

function logMaxChange() {
  const history = loadHistory();
  const today = new Date().toISOString().split('T')[0];

  // Only add if different from last entry
  const last = history.maxHistory.length > 0 ? history.maxHistory[history.maxHistory.length - 1] : null;
  if (last && last.squat === state.maxSquat && last.bench === state.maxBench && last.deadlift === state.maxDeadlift) {
    return;
  }

  // Update if same date, else add new
  const todayIdx = history.maxHistory.findIndex(m => m.date === today);
  const entry = { date: today, squat: state.maxSquat, bench: state.maxBench, deadlift: state.maxDeadlift };

  if (todayIdx >= 0) {
    history.maxHistory[todayIdx] = entry;
  } else {
    history.maxHistory.push(entry);
  }

  saveHistory(history);
}

// ============================================================
// HISTORY RENDERING
// ============================================================
function renderHistory() {
  const container = document.getElementById('historyPage');
  const history = loadHistory();

  if (history.sessions.length === 0 && history.maxHistory.length === 0) {
    container.innerHTML = `
      <div class="empty-history">
        <div class="icon">&#128202;</div>
        <h2>Pas encore d'historique</h2>
        <p>Complète des séances pour voir ton évolution ici.</p>
      </div>`;
    return;
  }

  let html = '<h2>Historique & Progression</h2>';

  // === MAXES EVOLUTION ===
  if (history.maxHistory.length > 0) {
    const latest = history.maxHistory[history.maxHistory.length - 1];
    const first = history.maxHistory[0];

    html += '<div class="maxes-history"><h3>Évolution des Maxes</h3>';
    html += '<div class="maxes-chart">';

    ['squat', 'bench', 'deadlift'].forEach(lift => {
      const current = latest[lift];
      const initial = first[lift];
      const delta = current - initial;
      const deltaClass = delta > 0 ? 'up' : delta < 0 ? 'down' : 'same';
      const deltaStr = delta > 0 ? `+${delta}` : delta === 0 ? '=' : `${delta}`;
      const label = lift.charAt(0).toUpperCase() + lift.slice(1);

      html += `<div class="max-chart-item">
        <div class="max-chart-label">${label}</div>
        <div class="max-chart-value">${current} kg
          <span class="max-chart-delta ${deltaClass}">${deltaStr}</span>
        </div>
      </div>`;
    });
    html += '</div>';

    // Max timeline (graph)
    if (history.maxHistory.length > 1) {
      const maxEntries = history.maxHistory.slice(-20); // Last 20 entries
      const allVals = maxEntries.flatMap(m => [m.squat, m.bench, m.deadlift]);
      const maxVal = Math.max(...allVals);
      const minVal = Math.min(...allVals) * 0.9;
      const range = maxVal - minVal || 1;

      html += '<div style="margin-top:16px"><h3 style="font-size:13px;color:var(--text2);margin-bottom:8px">Graphique des Maxes</h3>';
      html += '<div class="graph-bars">';
      maxEntries.forEach(m => {
        const sH = Math.round(((m.squat - minVal) / range) * 100);
        const bH = Math.round(((m.bench - minVal) / range) * 100);
        const dH = Math.round(((m.deadlift - minVal) / range) * 100);
        const dateLabel = `#${maxEntries.indexOf(m) + 1}`;
        html += `<div class="graph-bar-group">
          <div style="display:flex;gap:2px;align-items:flex-end;height:100%;width:100%">
            <div class="graph-bar squat" style="height:${sH}%" title="Squat ${m.squat}kg"></div>
            <div class="graph-bar bench" style="height:${bH}%" title="Bench ${m.bench}kg"></div>
            <div class="graph-bar dl" style="height:${dH}%" title="DL ${m.deadlift}kg"></div>
          </div>
          <div class="graph-bar-label">${dateLabel}</div>
        </div>`;
      });
      html += '</div>';
      html += `<div class="graph-legend">
        <div class="graph-legend-item"><div class="legend-dot" style="background:var(--green)"></div> Squat</div>
        <div class="graph-legend-item"><div class="legend-dot" style="background:var(--blue)"></div> Bench</div>
        <div class="graph-legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Deadlift</div>
      </div>`;
      html += '</div>';
    }

    // Timeline table
    html += '<div class="max-timeline" style="margin-top:12px">';
    history.maxHistory.slice().reverse().slice(0, 20).forEach((m, i) => {
      html += `<div class="max-timeline-row">
        <span class="max-timeline-date">${i === 0 ? 'Actuel' : `Mise à jour ${history.maxHistory.length - i}`}</span>
        <div class="max-timeline-values">
          <span class="max-timeline-val squat">S: ${m.squat}kg</span>
          <span class="max-timeline-val bench">B: ${m.bench}kg</span>
          <span class="max-timeline-val dl">D: ${m.deadlift}kg</span>
        </div>
      </div>`;
    });
    html += '</div></div>';
  }

  // === VOLUME GRAPH ===
  if (history.sessions.length > 1) {
    const recentSessions = history.sessions.slice(-30);
    const maxSets = Math.max(...recentSessions.map(s => s.setsTotal));

    html += '<div class="graph-container"><h3>Volume par séance (séries complétées)</h3>';
    html += '<div class="graph-bars">';
    recentSessions.forEach(s => {
      const h = Math.round((s.setsDone / maxSets) * 100);
      const color = s.setsDone === s.setsTotal ? 'var(--green)' : 'var(--orange)';
      const shortName = s.dayName.substring(0, 8);
      html += `<div class="graph-bar-group">
        <div class="graph-bar" style="height:${h}%;background:${color}" title="${s.dayName}: ${s.setsDone}/${s.setsTotal}"></div>
        <div class="graph-bar-label">${shortName}</div>
      </div>`;
    });
    html += '</div></div>';
  }

  // === SESSION LOGS ===
  html += '<h3 style="margin-bottom:12px;color:var(--text2);font-size:15px">Séances récentes</h3>';

  const sessions = history.sessions.slice().reverse();
  sessions.slice(0, 50).forEach((s, idx) => {
    const pct = Math.round((s.setsDone / s.setsTotal) * 100);
    const badgeClass = pct === 100 ? 'complete' : 'partial';
    const badgeText = pct === 100 ? '100%' : `${pct}%`;

    html += `<div class="session-log">
      <div class="session-header" onclick="toggleSessionDetail(${idx})">
        <span class="session-label">${s.cycle ? 'C' + s.cycle + ' ' : ''}${s.weekName} — ${s.dayName}</span>
        <span class="session-badge ${badgeClass}">${badgeText} (${s.setsDone}/${s.setsTotal})</span>
      </div>
      <div class="session-detail" id="session-${idx}">`;

    s.exercises.forEach(ex => {
      const exPct = ex.total > 0 ? Math.round((ex.done / ex.total) * 100) : 0;
      html += `<div class="session-exercise">
        <div class="session-exercise-name">${ex.name} (${ex.done}/${ex.total})</div>
        <div class="session-sets">${ex.sets.map(st =>
          `<span style="color:${st.done ? 'var(--green)' : 'var(--red)'}">&#${st.done ? '10003' : '10007'}; ${st.desc}</span>`
        ).join(' &nbsp; ')}</div>
      </div>`;
    });

    html += '</div></div>';
  });

  container.innerHTML = html;
}

function toggleSessionDetail(idx) {
  const el = document.getElementById('session-' + idx);
  if (el) el.classList.toggle('open');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Spacebar') {
    e.preventDefault();
    toggleTimer();
  }
  if (e.key === 'r' || e.key === 'R') resetTimer();
  if (e.key === 'ArrowRight') {
    if (state.day < 6) selectDay(state.day + 1);
    else if (state.week < 3 && isBlocUnlocked(state.week + 1)) { state.week++; selectDay(0); }
  }
  if (e.key === 'ArrowLeft') {
    if (state.day > 0) selectDay(state.day - 1);
    else if (state.week > 0) { state.week--; selectDay(6); }
  }
});

document.getElementById('settingsModal').addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) closeSettings();
});

// ============================================================
// INIT
// ============================================================
loadState();
render();
updateTimerDisplay();
logMaxChange(); // Track initial maxes

// Sync from Firebase (async — overwrites local if cloud data exists)
(async () => {
  const [fbState, fbHistory] = await Promise.all([fbGet('state'), fbGet('history')]);
  if (fbState) {
    state.cycle = fbState.cycle || 1;
    state.week = fbState.week || 0;
    state.day = fbState.day || 0;
    state.completions = fbState.completions || {};
    state.maxSquat = fbState.maxSquat || 110;
    state.maxBench = fbState.maxBench || 97;
    state.maxDeadlift = fbState.maxDeadlift || 120;
    state.timerDuration = fbState.timerDuration || 120;
    state.timerRemaining = state.timerDuration;
    if (!isBlocUnlocked(state.week)) { state.week = 0; state.day = 0; }
    localStorage.setItem('muscu_program', JSON.stringify(fbState));
    render();
    updateTimerDisplay();
  }
  if (fbHistory) {
    localStorage.setItem('muscu_history', JSON.stringify(fbHistory));
    if (currentPage === 'history') renderHistory();
  }
})();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
